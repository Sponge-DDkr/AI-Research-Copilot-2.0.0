# ============================================
# AI Research Copilot — Docker Compose
# 一键启动：docker compose up -d
# ============================================

services:
  # ── FastAPI 后端 ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: research-backend
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # 持久化数据（SQLite + ChromaDB）
      - ./data:/app/data
      # 记忆文件持久化
      - ./memory:/app/memory
      # 环境变量（含 API Key）
      - ./.env:/app/.env:ro
    environment:
      - HF_HOME=/app/data/models
      - SENTENCE_TRANSFORMERS_HOME=/app/data/models
    restart: unless-stopped
    networks:
      - research-net

  # ── React 前端（Vite 开发服务器）──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: research-frontend
    ports:
      - "5173:5173"
    volumes:
      # 源码热更新（修改前端代码无需重建镜像）
      - ./frontend/src:/app/src
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - research-net

networks:
  research-net:
    driver: bridge
